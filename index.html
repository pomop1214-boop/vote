<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>모임 참석 체크</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Black+Han+Sans&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Gowun Dodum', sans-serif; }
  .opt-btn { transition: all .15s ease; cursor: pointer; }
  .opt-btn:active { transform: scale(.97); }
  .row:hover { background: #faf7f0; }
</style>
</head>
<body>
<div id="root"></div>

<!-- ===================================================================== -->
<!-- ▼▼▼ 여기 두 줄만 본인 Supabase 값으로 바꾸세요 (가이드 참고) ▼▼▼ -->
<script>
  window.SUPABASE_URL = "https://ipklnamaievuwnkjmndq.supabase.co";
  window.SUPABASE_ANON_KEY = "sb_publishable_Aen_4oBejenDR_3zojgiSg_uMEdUD_U";
</script>
<!-- ▲▲▲ 위 두 줄만 수정하면 끝 ▲▲▲ -->
<!-- ===================================================================== -->

<script type="text/babel">
const { useState, useEffect } = React;

const STATUS = {
  yes: { label: "참석", color: "#2f7d4f", bg: "#e6f4ea" },
  no: { label: "불참", color: "#b23b3b", bg: "#fbe9e9" },
};
const MENUS = {
  movie: { label: "영화", sub: "토이스토리 5 등", emoji: "🎬", color: "#c2632b", bg: "#fbede2" },
  exhibit: { label: "전시회", sub: "키크니 (후기 좋음)", emoji: "🖼️", color: "#7a4ea0", bg: "#f1eaf7" },
};
const PRACTICE_TIMES = ["14:00", "15:00"];
const DEADLINE = new Date(2026, 5, 29, 20, 0, 0);

// Supabase 클라이언트
const sbReady =
  window.SUPABASE_URL &&
  window.SUPABASE_ANON_KEY &&
  !window.SUPABASE_URL.includes("여기에");
const sb = sbReady
  ? window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY)
  : null;

function getRemaining() {
  const diff = DEADLINE.getTime() - Date.now();
  if (diff <= 0) return { closed: true, h: 0, m: 0, s: 0 };
  const total = Math.floor(diff / 1000);
  return {
    closed: false,
    h: Math.floor(total / 3600),
    m: Math.floor((total % 3600) / 60),
    s: total % 60,
  };
}
function getMode() {
  const h = (window.location.hash || "").toLowerCase();
  return h.includes("summary") ? "summary" : "respond";
}

async function fetchResponses() {
  if (!sb) return [];
  const { data, error } = await sb
    .from("responses")
    .select("*")
    .order("ts", { ascending: true });
  if (error) {
    console.error(error);
    return [];
  }
  return data || [];
}

function AttendanceApp() {
  const [mode, setMode] = useState(getMode());
  const [responses, setResponses] = useState([]);
  const [loading, setLoading] = useState(true);
  const [name, setName] = useState("");
  const [practice, setPractice] = useState("");
  const [practiceTime, setPracticeTime] = useState("");
  const [afterparty, setAfterparty] = useState("");
  const [menu, setMenu] = useState("");
  const [submitted, setSubmitted] = useState(false);
  const [sending, setSending] = useState(false);
  const [remaining, setRemaining] = useState(getRemaining());

  useEffect(() => {
    const t = setInterval(() => setRemaining(getRemaining()), 1000);
    return () => clearInterval(t);
  }, []);
  useEffect(() => {
    const onHash = () => setMode(getMode());
    window.addEventListener("hashchange", onHash);
    return () => window.removeEventListener("hashchange", onHash);
  }, []);

  const load = async () => {
    setResponses(await fetchResponses());
    setLoading(false);
  };
  useEffect(() => {
    load();
  }, []);
  useEffect(() => {
    if (mode !== "summary") return;
    const t = setInterval(load, 4000);
    return () => clearInterval(t);
  }, [mode]);

  const menuNeeded = afterparty === "yes";
  const timeNeeded = practice === "yes";

  const submit = async () => {
    if (remaining.closed || sending) return;
    if (!name.trim() || !practice || !afterparty) return;
    if (timeNeeded && !practiceTime) return;
    if (menuNeeded && !menu) return;
    if (!sb) {
      alert("Supabase 설정이 아직 안 됐어요. 파일 상단의 URL/KEY를 입력해 주세요.");
      return;
    }
    setSending(true);
    const entry = {
      name: name.trim(),
      practice,
      practice_time: timeNeeded ? practiceTime : "",
      afterparty,
      menu: menuNeeded ? menu : "",
      ts: new Date().toISOString(),
    };
    // 같은 이름 기존 응답 삭제 후 삽입 (덮어쓰기)
    await sb.from("responses").delete().ilike("name", name.trim());
    const { error } = await sb.from("responses").insert(entry);
    setSending(false);
    if (error) {
      alert("제출 중 오류가 났어요: " + error.message);
      return;
    }
    setSubmitted(true);
  };

  const reset = () => {
    setName("");
    setPractice("");
    setPracticeTime("");
    setAfterparty("");
    setMenu("");
    setSubmitted(false);
  };

  const remove = async (id) => {
    if (!sb) return;
    await sb.from("responses").delete().eq("id", id);
    load();
  };

  const count = (field, val) =>
    responses.filter((r) => r[field] === val).length;
  const menuCount = (val) => responses.filter((r) => r.menu === val).length;

  const canSubmit =
    name.trim() &&
    practice &&
    afterparty &&
    (!timeNeeded || practiceTime) &&
    (!menuNeeded || menu);

  return (
    <div style={s.root}>
      <div style={s.card}>
        <header style={s.header}>
          <div style={s.tagRow}>
            <span style={s.modeTag}>
              {mode === "summary" ? "📊 집계 화면" : "✍️ 참석 응답"}
            </span>
          </div>
          <div style={s.logo}>모임 참석 체크</div>
        </header>

        {!sbReady && <SetupNotice />}

        {loading ? (
          <div style={s.loading}>불러오는 중…</div>
        ) : mode === "summary" ? (
          <Summary
            responses={responses}
            count={count}
            menuCount={menuCount}
            onRemove={remove}
            onRefresh={load}
          />
        ) : submitted ? (
          <div style={s.done}>
            <div style={s.checkCircle}>✓</div>
            <h2 style={s.doneTitle}>응답 완료!</h2>
            <p style={s.doneSub}>
              <b>{name}</b>님의 참석 여부가 저장됐어요.
            </p>
            <div style={s.doneRow}>
              <span>연습실</span>
              <span style={{ display: "flex", gap: 8, alignItems: "center" }}>
                <Badge status={practice} />
                {practice === "yes" && practiceTime && (
                  <span style={s.timeChip}>{practiceTime}</span>
                )}
              </span>
            </div>
            <div style={s.doneRow}>
              <span>뒤풀이</span>
              <Badge status={afterparty} />
            </div>
            {menuNeeded && (
              <div style={s.doneRow}>
                <span>하고싶은 활동</span>
                <MenuBadge menu={menu} />
              </div>
            )}
            <button className="opt-btn" style={s.primaryBtn} onClick={reset}>
              다른 사람도 응답하기
            </button>
          </div>
        ) : (
          <div style={s.form}>
            <CountdownBanner remaining={remaining} />
            <p style={s.intro}>
              연습실·뒤풀이 참석 여부와 하고싶은 활동을 알려주세요.
            </p>

            <label style={s.label}>이름</label>
            <input
              style={s.input}
              placeholder="이름을 입력하세요"
              value={name}
              onChange={(e) => setName(e.target.value)}
            />

            <label style={s.label}>
              연습실 참여{" "}
              <span style={s.labelTime}>( 14:00 ~ 17:00 )</span>
            </label>
            <OptionGroup value={practice} onChange={setPractice} />

            {timeNeeded && (
              <React.Fragment>
                <label style={s.label}>연습실 참석 시간</label>
                <div style={s.optGroup}>
                  {PRACTICE_TIMES.map((t) => {
                    const active = practiceTime === t;
                    return (
                      <button
                        key={t}
                        className="opt-btn"
                        style={{
                          ...s.opt,
                          borderColor: active ? "#2f7d4f" : "#ddd",
                          background: active ? "#e6f4ea" : "#fff",
                          color: active ? "#2f7d4f" : "#666",
                          fontWeight: active ? 700 : 500,
                        }}
                        onClick={() => setPracticeTime(t)}
                      >
                        {t}
                      </button>
                    );
                  })}
                </div>
              </React.Fragment>
            )}

            <label style={s.label}>뒤풀이 참여</label>
            <OptionGroup value={afterparty} onChange={setAfterparty} />

            {menuNeeded && (
              <React.Fragment>
                <label style={s.label}>하고싶은 활동 선택</label>
                <MenuGroup value={menu} onChange={setMenu} />
              </React.Fragment>
            )}

            <button
              className="opt-btn"
              style={{
                ...s.primaryBtn,
                background: remaining.closed ? "#b0a48a" : "#c2632b",
                opacity: remaining.closed ? 1 : canSubmit && !sending ? 1 : 0.4,
                cursor: remaining.closed ? "not-allowed" : "pointer",
              }}
              onClick={submit}
              disabled={remaining.closed || sending}
            >
              {remaining.closed
                ? "투표가 마감되었습니다"
                : sending
                ? "제출 중…"
                : "제출하기"}
            </button>
          </div>
        )}
      </div>

      {mode !== "summary" ? (
        <p style={s.foot}>
          이 링크는 <b>참석 응답용</b>입니다. 단체방에 그대로 공유하세요.
        </p>
      ) : (
        <div style={s.linkBox}>
          <div style={s.linkTitle}>🔗 응답용 링크 공유하기</div>
          <p style={s.linkDesc}>
            지금 보고 있는 이 집계 주소에서 끝의 <b>#summary</b>를 뺀 주소가
            응답용 링크예요. 아래 버튼으로 복사해 단체방에 공유하세요.
          </p>
          <button
            className="opt-btn"
            style={s.copyBtn}
            onClick={() => {
              const respondLink =
                window.location.origin + window.location.pathname;
              if (navigator.clipboard) navigator.clipboard.writeText(respondLink);
              alert("응답용 링크가 복사됐어요:\n" + respondLink);
            }}
          >
            응답용 링크 복사
          </button>
        </div>
      )}
    </div>
  );
}

function SetupNotice() {
  return (
    <div style={s.setup}>
      <b>⚙️ 설정 필요</b>
      <br />
      파일 상단의 <code style={s.code}>SUPABASE_URL</code> /{" "}
      <code style={s.code}>SUPABASE_ANON_KEY</code>를 본인 값으로 채워야
      응답이 저장됩니다. (함께 받은 가이드를 참고하세요)
    </div>
  );
}

function CountdownBanner({ remaining }) {
  if (remaining.closed) {
    return (
      <div style={{ ...s.banner, background: "#fbe9e9", borderColor: "#e8c4c4" }}>
        <div style={{ ...s.bannerLabel, color: "#b23b3b" }}>⏰ 투표 마감</div>
        <div style={{ ...s.bannerSub, color: "#b23b3b" }}>
          6월 29일 오후 8시 마감 시간이 지났어요.
        </div>
      </div>
    );
  }
  const pad = (n) => String(n).padStart(2, "0");
  return (
    <div style={s.banner}>
      <div style={s.bannerLabel}>⏳ 투표 마감까지</div>
      <div style={s.bannerTime}>
        {remaining.h > 0 && <Unit value={remaining.h} label="시간" />}
        <Unit value={pad(remaining.m)} label="분" />
        <Unit value={pad(remaining.s)} label="초" />
      </div>
      <div style={s.bannerSub}>6월 29일(월) 오후 8시까지 응답해 주세요</div>
    </div>
  );
}
function Unit({ value, label }) {
  return (
    <span style={s.unit}>
      <span style={s.unitNum}>{value}</span>
      <span style={s.unitLabel}>{label}</span>
    </span>
  );
}
function OptionGroup({ value, onChange }) {
  return (
    <div style={s.optGroup}>
      {Object.entries(STATUS).map(([key, cfg]) => {
        const active = value === key;
        return (
          <button
            key={key}
            className="opt-btn"
            style={{
              ...s.opt,
              borderColor: active ? cfg.color : "#ddd",
              background: active ? cfg.bg : "#fff",
              color: active ? cfg.color : "#666",
              fontWeight: active ? 700 : 500,
            }}
            onClick={() => onChange(key)}
          >
            {cfg.label}
          </button>
        );
      })}
    </div>
  );
}
function MenuGroup({ value, onChange }) {
  return (
    <div style={s.menuGroup}>
      {Object.entries(MENUS).map(([key, cfg]) => {
        const active = value === key;
        return (
          <button
            key={key}
            className="opt-btn"
            style={{
              ...s.menuOpt,
              borderColor: active ? cfg.color : "#ddd",
              background: active ? cfg.bg : "#fff",
            }}
            onClick={() => onChange(key)}
          >
            <span style={s.menuEmoji}>{cfg.emoji}</span>
            <span
              style={{
                ...s.menuLabel,
                color: active ? cfg.color : "#3a2e1c",
                fontWeight: active ? 700 : 600,
              }}
            >
              {cfg.label}
            </span>
            <span style={s.menuSub}>{cfg.sub}</span>
          </button>
        );
      })}
    </div>
  );
}
function Badge({ status }) {
  const cfg = STATUS[status] || STATUS.yes;
  return (
    <span style={{ background: cfg.bg, color: cfg.color, padding: "3px 12px", borderRadius: 20, fontSize: 13, fontWeight: 700 }}>
      {cfg.label}
    </span>
  );
}
function MenuBadge({ menu }) {
  if (!menu) return <span style={{ color: "#bbb", fontSize: 13 }}>-</span>;
  const cfg = MENUS[menu];
  if (!cfg) return <span style={{ color: "#bbb", fontSize: 13 }}>-</span>;
  return (
    <span style={{ background: cfg.bg, color: cfg.color, padding: "3px 12px", borderRadius: 20, fontSize: 13, fontWeight: 700 }}>
      {cfg.emoji} {cfg.label}
    </span>
  );
}

function Summary({ responses, count, menuCount, onRemove, onRefresh }) {
  if (responses.length === 0) {
    return (
      <div style={s.empty}>
        아직 응답이 없어요.<br />
        응답용 링크를 공유하고 기다려보세요.
        <br />
        <br />
        <button className="opt-btn" style={s.refreshBtn} onClick={onRefresh}>
          새로고침
        </button>
      </div>
    );
  }
  const bars = [
    { field: "practice", title: "연습실 참여" },
    { field: "afterparty", title: "뒤풀이 참여" },
  ];
  const timeCount = (t) =>
    responses.filter((r) => r.practice === "yes" && r.practice_time === t).length;
  const totalPracticeYes = count("practice", "yes");
  const totalMenu = menuCount("movie") + menuCount("exhibit");

  return (
    <div style={s.summary}>
      {bars.map((b) => (
        <div key={b.field} style={s.statBlock}>
          <div style={s.statTitle}>{b.title}</div>
          <div style={s.statRow}>
            {Object.entries(STATUS).map(([key, cfg]) => {
              const c = count(b.field, key);
              const pct = Math.round((c / responses.length) * 100);
              return (
                <div key={key} style={s.statItem}>
                  <div style={{ ...s.statNum, color: cfg.color }}>{c}</div>
                  <div style={s.statLabel}>{cfg.label}</div>
                  <div style={s.barTrack}>
                    <div style={{ ...s.barFill, width: pct + "%", background: cfg.color }} />
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      ))}

      <div style={s.statBlock}>
        <div style={s.statTitle}>연습실 참석 시간대 (참석자 기준)</div>
        <div style={s.statRow}>
          {PRACTICE_TIMES.map((t) => {
            const c = timeCount(t);
            const pct = totalPracticeYes ? Math.round((c / totalPracticeYes) * 100) : 0;
            return (
              <div key={t} style={s.statItem}>
                <div style={{ ...s.statNum, color: "#2f7d4f" }}>{c}</div>
                <div style={s.statLabel}>{t}</div>
                <div style={s.barTrack}>
                  <div style={{ ...s.barFill, width: pct + "%", background: "#2f7d4f" }} />
                </div>
              </div>
            );
          })}
        </div>
      </div>

      <div style={s.statBlock}>
        <div style={s.statTitle}>하고싶은 활동 (뒤풀이 참석 기준)</div>
        <div style={s.menuStatRow}>
          {Object.entries(MENUS).map(([key, cfg]) => {
            const c = menuCount(key);
            const pct = totalMenu ? Math.round((c / totalMenu) * 100) : 0;
            return (
              <div key={key} style={{ ...s.menuStatCard, background: cfg.bg }}>
                <div style={s.menuStatTop}>
                  <span style={s.menuStatEmoji}>{cfg.emoji}</span>
                  <span style={{ ...s.menuStatName, color: cfg.color }}>{cfg.label}</span>
                </div>
                <div style={{ ...s.menuStatNum, color: cfg.color }}>{c}표</div>
                <div style={s.menuBarTrack}>
                  <div style={{ ...s.barFill, width: pct + "%", background: cfg.color }} />
                </div>
                <div style={s.menuStatPct}>{pct}%</div>
              </div>
            );
          })}
        </div>
      </div>

      <div style={s.tableHead}>
        <span style={s.tableTitle}>전체 응답 ({responses.length}명)</span>
        <button className="opt-btn" style={s.refreshBtnSm} onClick={onRefresh}>
          ↻ 새로고침
        </button>
      </div>
      <div style={s.table}>
        <div style={{ ...s.trow, ...s.thead }}>
          <span style={s.cName}>이름</span>
          <span style={s.cCol}>연습실</span>
          <span style={s.cCol}>뒤풀이</span>
          <span style={s.cMenu}>메뉴</span>
          <span style={s.cDel}></span>
        </div>
        {responses
          .slice()
          .reverse()
          .map((r) => (
            <div key={r.id} className="row" style={s.trow}>
              <span style={s.cName}>{r.name}</span>
              <span style={s.cCol}>
                <Badge status={r.practice} />
                {r.practice === "yes" && r.practice_time && (
                  <div style={s.cellTime}>{r.practice_time}</div>
                )}
              </span>
              <span style={s.cCol}>
                <Badge status={r.afterparty} />
              </span>
              <span style={s.cMenu}>
                <MenuBadge menu={r.menu} />
              </span>
              <button className="opt-btn" style={s.delBtn} onClick={() => onRemove(r.id)} title="삭제">
                ✕
              </button>
            </div>
          ))}
      </div>
    </div>
  );
}

const s = {
  root: { minHeight: "100vh", background: "linear-gradient(160deg, #f4ede0 0%, #ece4d3 100%)", padding: "32px 16px", fontFamily: "'Gowun Dodum', sans-serif", display: "flex", flexDirection: "column", alignItems: "center" },
  card: { width: "100%", maxWidth: 480, background: "#fffdf8", borderRadius: 24, boxShadow: "0 20px 50px rgba(80,60,30,.12)", border: "1px solid #efe6d4", overflow: "hidden" },
  header: { padding: "24px 28px 22px", borderBottom: "2px solid #efe6d4" },
  tagRow: { marginBottom: 12 },
  modeTag: { fontSize: 13, fontWeight: 700, color: "#c2632b", background: "#fbede2", padding: "5px 12px", borderRadius: 20 },
  logo: { fontFamily: "'Black Han Sans', sans-serif", fontSize: 30, color: "#3a2e1c", letterSpacing: "-1px" },
  setup: { margin: "16px 20px 0", padding: "12px 16px", background: "#fff4e0", border: "1px solid #f0d9a8", borderRadius: 12, fontSize: 13, color: "#8a6a1e", lineHeight: 1.6 },
  code: { background: "#fbe9c8", padding: "1px 5px", borderRadius: 4, fontSize: 12 },
  loading: { padding: 60, textAlign: "center", color: "#a99a7d" },
  form: { padding: "24px 28px 32px" },
  intro: { color: "#7a6c52", fontSize: 15, margin: "0 0 20px" },
  banner: { background: "#fbf3df", border: "1.5px solid #ecdcae", borderRadius: 16, padding: "16px 18px", textAlign: "center", marginBottom: 22 },
  bannerLabel: { fontSize: 13, fontWeight: 700, color: "#a07b1e", marginBottom: 8 },
  bannerTime: { display: "flex", justifyContent: "center", alignItems: "baseline", gap: 14, marginBottom: 6 },
  unit: { display: "flex", flexDirection: "column", alignItems: "center" },
  unitNum: { fontFamily: "'Black Han Sans', sans-serif", fontSize: 30, color: "#3a2e1c", lineHeight: 1 },
  unitLabel: { fontSize: 11, color: "#a99a7d", marginTop: 3 },
  bannerSub: { fontSize: 12, color: "#a07b1e" },
  label: { display: "block", fontSize: 14, color: "#5a4d36", fontWeight: 700, margin: "18px 0 8px" },
  labelTime: { fontSize: 13, fontWeight: 600, color: "#a99a7d" },
